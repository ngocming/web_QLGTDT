<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Dashboard • Quản lý người dùng</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body class="page-dashboard">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar" aria-label="Thanh điều hướng">
        <div class="sidebar__brand">
          <a class="brand" href="dashboard.html" aria-label="Trang dashboard">UserDash</a>
          <button
            class="icon-btn sidebar__toggle"
            type="button"
            data-action="toggleSidebar"
            aria-label="Thu gọn menu"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M7 6h14M7 12h14M7 18h14M3 6h.01M3 12h.01M3 18h.01"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>

        <nav class="sidebar__nav">
          <a class="nav-item is-active" href="dashboard.html">Dashboard</a>
        </nav>

        <div class="sidebar__footer">
          <div id="sessionChip" class="user-chip" aria-label="Phiên đăng nhập"></div>
          <button class="btn btn--ghost w-100" type="button" data-action="logout">Đăng xuất</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button
            class="icon-btn topbar__menu"
            type="button"
            data-action="toggleSidebar"
            aria-label="Mở menu"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M4 6h16M4 12h16M4 18h16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>

          <div class="topbar__title">
            <h1>Quản lý người dùng</h1>
            <p class="muted">Tạo/Sửa/Xóa + thống kê nhanh</p>
          </div>

          <div class="topbar__actions">
            <label class="search" aria-label="Tìm kiếm">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm10 2-6-6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <input id="searchInput" type="search" placeholder="Tìm theo username, họ tên, email..." />
            </label>
            <button class="btn btn--primary" type="button" data-action="openCreate">+ Thêm</button>
          </div>
        </header>

        <section class="cards" aria-label="Thống kê">
          <article class="card card--stat">
            <div class="stat">
              <div class="stat__label">Tổng người dùng</div>
              <div id="statTotal" class="stat__value">0</div>
            </div>
          </article>
          <article class="card card--stat">
            <div class="stat">
              <div class="stat__label">Đang hoạt động</div>
              <div id="statActive" class="stat__value">0</div>
            </div>
          </article>
          <article class="card card--stat">
            <div class="stat">
              <div class="stat__label">Admin</div>
              <div id="statAdmin" class="stat__value">0</div>
            </div>
          </article>
        </section>

        <section class="panel" aria-label="Danh sách người dùng">
          <div class="panel__header">
            <h2 class="panel__title">Danh sách</h2>
            <div class="filters">
              <label class="select">
                <span class="sr-only">Lọc theo quyền</span>
                <select id="filterRole">
                  <option value="">Tất cả quyền</option>
                  <option value="Admin">Admin</option>
                  <option value="Nhân viên">Nhân viên</option>
                </select>
              </label>
              <label class="select">
                <span class="sr-only">Lọc theo trạng thái</span>
                <select id="filterStatus">
                  <option value="">Tất cả trạng thái</option>
                  <option value="Hoạt động">Hoạt động</option>
                  <option value="Tạm khóa">Tạm khóa</option>
                </select>
              </label>
              <label class="select">
                <span class="sr-only">Sắp xếp</span>
                <select id="sortBy">
                  <option value="createdAt_desc">Mới nhất</option>
                  <option value="createdAt_asc">Cũ nhất</option>
                  <option value="username_asc">Username A→Z</option>
                  <option value="username_desc">Username Z→A</option>
                  <option value="fullName_asc">Họ tên A→Z</option>
                  <option value="fullName_desc">Họ tên Z→A</option>
                </select>
              </label>
            </div>
          </div>

          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Username</th>
                  <th>Họ tên</th>
                  <th>Email</th>
                  <th>Quyền</th>
                  <th>Trạng thái</th>
                  <th>Ngày tạo</th>
                  <th class="th-actions">Thao tác</th>
                </tr>
              </thead>
              <tbody id="usersTbody"></tbody>
            </table>
          </div>

          <div class="panel__footer">
            <div id="tableSummary" class="muted">0 kết quả</div>
            <div class="pagination">
              <button class="btn btn--ghost" type="button" data-action="prevPage">Trước</button>
              <span id="pageInfo" class="muted">Trang 1/1</span>
              <button class="btn btn--ghost" type="button" data-action="nextPage">Sau</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="userModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal__backdrop" data-action="closeModal" aria-hidden="true"></div>
      <div class="modal__dialog" role="document">
        <div class="modal__header">
          <h3 id="modalTitle" class="modal__title">Thêm người dùng</h3>
          <button class="icon-btn" type="button" data-action="closeModal" aria-label="Đóng">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M6 6l12 12M18 6 6 18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>

        <form id="userForm" class="modal__body form">
          <input id="userId" type="hidden" />

          <div class="form-grid">
            <label class="field">
              <span class="field__label">Username</span>
              <input id="username" name="username" type="text" autocomplete="off" required />
            </label>

            <label class="field">
              <span class="field__label">Họ tên</span>
              <input id="fullName" name="fullName" type="text" autocomplete="name" />
            </label>

            <label class="field">
              <span class="field__label">Email</span>
              <input id="email" name="email" type="email" autocomplete="email" />
            </label>

            <label class="field">
              <span class="field__label">Quyền</span>
              <select id="role" name="role" required>
                <option value="Admin">Admin</option>
                <option value="Nhân viên">Nhân viên</option>
              </select>
            </label>

            <label class="field">
              <span class="field__label">Trạng thái</span>
              <select id="status" name="status" required>
                <option value="Hoạt động">Hoạt động</option>
                <option value="Tạm khóa">Tạm khóa</option>
              </select>
            </label>

            <label class="field">
              <span id="passwordLabel" class="field__label">Mật khẩu</span>
              <input id="password" name="password" type="password" autocomplete="new-password" />
            </label>
          </div>

          <p id="passwordHint" class="muted small">
            Khi sửa người dùng: để trống mật khẩu nếu không muốn đổi.
          </p>
        </form>

        <div class="modal__footer">
          <button class="btn btn--ghost" type="button" data-action="closeModal">Hủy</button>
          <button class="btn btn--primary" type="submit" form="userForm">Lưu</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
